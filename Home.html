<html class="">
<head>
    <script>
    let cdn = "https://cdn.bopimo.com";
    function localFallback() {
        document.querySelectorAll(`script[src^="${cdn}"]`).forEach((script) => {
            let url = script.getAttribute('src')
            let path = new URL(url).pathname.split('static')[1]
            var script = document.createElement('script');
            script.src = path;
            document.head.appendChild(script);
        })
    }
    function localCssFallback() {
        document.querySelectorAll(`link[href^="${cdn}"]`).forEach((style) => {
            let url = style.getAttribute('href')
            let path = new URL(url).pathname.split('static')[1]
            var link = document.createElement('link');
            link.href = path
            link.rel = 'stylesheet'
            document.head.appendChild(link);
        })
    }
    function localFallbacks() {
        localFallback()
        localCssFallback()
    }
    function cdnCheck() {
        window.Vue || (localFallbacks())
    }
</script>
