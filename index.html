<!DOCTYPE html>
<html lang="en" class="cc--darkmode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PaulyRoom</title>
    <link href="https://cdn.polytoria.com/static/app-DGvpBOdG.css" rel="stylesheet">
    <link rel="stylesheet" href="https://kit-pro.fontawesome.com/releases/v7.2.0/css/pro.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body class="theme-auto">

<div class="auth-container">
    <div class="auth-background" style="background-image: url('https://cdn.polytoria.com/thumbnails/places/featured/UmOKvsBwGbJ8ccHdmTjMTi05sI6xHfPF.png');"></div>

    <div class="row justify-content-end align-items-center p-lg-5" style="height: 100%;">
        <div class="col-12" style="max-width:450px">
            <div class="card mcard auth-form-container">
                <div class="card-body text-center p-4">
                    <h4 class="fw-bold mb-2">Welcome Back</h4>
                    <h6>Login to your PaulyRoom account</h6>

                    <form id="login-form">
                        <div class="input-group mb-3">
                            <span class="input-group-text pe-1"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" class="form-control" id="username-input" placeholder="Username" required>
                        </div>

                        <div class="input-group mb-3">
                            <span class="input-group-text pe-1"><i class="fas fa-key text-muted"></i></span>
                            <input type="password" class="form-control" id="password-input" placeholder="Password" required>
                            <button class="input-group-text btn btn-outline-secondary" type="button" id="toggle-password">
                                <i class="fas fa-eye-slash" id="eye-icon"></i>
                            </button>
                        </div>

                        <div class="d-grid mt-3">
                            <button type="submit" class="btn btn-lg btn-primary" id="login-btn">Login</button>
                        </div>
                    </form>

                    <div class="mt-3">
                        <small>Don't have an account? <a href="index.html" class="text-primary fw-bold">Make a free account</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBy431WZJp9k4DLL8AclwqU8G3QhVKJ3Ws",
  authDomain: "paulyroom-dc99e.firebaseapp.com",
  projectId: "paulyroom-dc99e",
  storageBucket: "paulyroom-dc99e.firebasestorage.app",
  messagingSenderId: "676053619588",
  appId: "1:676053619588:web:2abffee0cf9295031303d1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

$('#login-form').on('submit', async function(e) {
    e.preventDefault();

    const username = $('#username-input').val().trim();
    const password = $('#password-input').val();
    const btn = $('#login-btn');

    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Logging in...');

    try {
        const snap = await db.collection("usernames").where("lowercase", "==", username.toLowerCase()).get();
        if (snap.empty) throw new Error("Username not found");

        const userData = snap.docs[0].data();
        const userDoc = await db.collection("users").doc(userData.uid).get();
        if (!userDoc.exists) throw new Error("Account not found");

        const user = userDoc.data();

        if (user.password !== password) throw new Error("Incorrect password");

        btn.html('<i class="fas fa-check"></i> Success! Redirecting...');

        setTimeout(() => {
            window.location.href = "Home.html";
        }, 1200);

    } catch (err) {
        alert(err.message);
        btn.prop('disabled', false).text('Login');
    }
});

// Password Toggle
$('#toggle-password').on('click', function() {
    const pass = $('#password-input');
    const icon = $('#eye-icon');
    if (pass.attr('type') === 'password') {
        pass.attr('type', 'text');
        icon.removeClass('fa-eye-slash').addClass('fa-eye');
    } else {
        pass.attr('type', 'password');
        icon.removeClass('fa-eye').addClass('fa-eye-slash');
    }
});
</script>

</body>
</html>
